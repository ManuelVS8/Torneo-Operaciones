<html lang="es">
<head>

<style>
:root{--ink:#0f1c2e;--ink2:#2d4057;--ink3:#5a7292;--paper:#f5f3ee;--paper2:#eceae4;--paper3:#e0ddd5;--white:#ffffff;--accent:#e8520a;--accent2:#f97316;--blue:#1d4ed8;--blue2:#3b82f6;--teal:#0d9488;--red:#dc2626;--yellow:#d97706;--shadow-sm:0 1px 4px rgba(15,28,46,.1);--shadow:0 4px 16px rgba(15,28,46,.12);--shadow-lg:0 8px 32px rgba(15,28,46,.16);--r:10px;--r-lg:16px;--ease:cubic-bezier(.4,0,.2,1);--t:.2s var(--ease)}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;transition:background var(--t),color var(--t)}
#app{display:flex;flex-direction:column;min-height:100vh}header{position:sticky;top:0;z-index:90;background:var(--ink);color:#fff;height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;box-shadow:var(--shadow)}
.logo{display:flex;align-items:center;gap:10px}.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:0 3px 10px rgba(232,82,10,.45)}.logo-mark:hover{transform:rotate(-8deg) scale(1.1)}
.logo-text{font-family:'Playfair Display',serif;font-size:1.2rem}.logo-sub{font-size:.65rem;opacity:.5;font-family:'DM Mono',monospace;letter-spacing:.08em;text-transform:uppercase}
.hdr-actions{display:flex;gap:6px}.hdr-btn{height:34px;padding:0 12px;border-radius:8px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.13);color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:5px;transition:var(--t)}.hdr-btn:hover{background:rgba(255,255,255,.18)}
main{flex:1;padding:24px 16px 100px;max-width:980px;margin:0 auto;width:100%}
.nav-tabs{display:flex;gap:2px;background:var(--white);border-radius:var(--r-lg);padding:4px;box-shadow:var(--shadow-sm);margin-bottom:20px}.nav-tab{flex:1;padding:9px 4px;border:none;background:transparent;border-radius:var(--r);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.75rem;color:var(--ink3);transition:var(--t);display:flex;flex-direction:column;align-items:center;gap:2px}.nav-tab .ti{font-size:1.1rem}.nav-tab:hover:not(.active){background:var(--paper2);color:var(--ink)}.nav-tab.active{background:var(--ink);color:#fff}

.ob-wrap{max-width:580px;margin:0 auto}.ob-card{text-align:center;padding:36px 28px}.ob-desc{color:var(--ink2);line-height:1.65;margin-bottom:22px;font-size:.92rem}.ob-steps{display:flex;gap:6px;justify-content:center;margin-bottom:22px}.ob-dot{width:8px;height:8px;border-radius:50%;background:var(--paper3);transition:var(--t)}.ob-dot.active{background:var(--accent);transform:scale(1.4)}.ob-prog{background:var(--paper3);border-radius:20px;height:4px;margin-bottom:22px}.ob-prog-fill{background:linear-gradient(90deg,var(--blue2),var(--accent));height:100%;border-radius:20px;transition:width .4s var(--ease)}
.grid-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}.sched-grid{display:grid;grid-template-columns:72px repeat(5,1fr);gap:3px;min-width:540px}.sg-hdr{background:var(--ink);color:#fff;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:9px 6px;text-align:center;border-radius:7px}.sg-hdr.time-hdr{background:var(--ink2)}.sg-time{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--ink3);text-align:right;padding:0 8px 0 0;display:flex;flex-direction:column;justify-content:center;line-height:1.4}

.area-palette{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.area-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 13px;border-radius:30px;color:#fff;font-weight:700;font-size:.8rem;cursor:pointer;transition:var(--t);border:2px solid transparent}.area-pill:hover{transform:translateY(-2px);box-shadow:var(--shadow)}.area-pill.painting{box-shadow:0 0 0 3px rgba(255,255,255,.6),var(--shadow-lg);transform:scale(1.08)}

.area-selector{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}.area-sel-btn{padding:7px 14px;border-radius:30px;border:2px solid var(--paper3);background:transparent;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.78rem;cursor:pointer;color:var(--ink2);transition:var(--t)}.area-sel-btn:hover{border-color:var(--ink3);color:var(--ink)}.area-sel-btn.active{color:#fff;border-color:transparent}.av-day-section{margin-bottom:16px}.av-day-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--ink3);margin-bottom:6px}.av-slot{background:var(--paper2);border-radius:10px;padding:10px 14px;margin-bottom:6px;border-left:3px solid transparent}.av-slot-time{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--ink3);margin-bottom:5px}
.week-view-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}.week-table{width:100%;min-width:520px;border-collapse:collapse}.week-table th{background:var(--ink);color:#fff;padding:10px 8px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;text-align:center}.week-table th.wt-time{background:var(--ink2);width:58px}.week-table td{border:1px solid var(--paper3);padding:0;vertical-align:top;min-width:90px}.week-table td.wt-time-cell{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--ink3);text-align:right;padding:0 7px;background:var(--paper2);white-space:nowrap;vertical-align:middle}.wt-slot{height:52px;display:flex;align-items:center;justify-content:center;padding:4px 6px;cursor:pointer;transition:background .15s;flex-direction:column;gap:3px;position:relative;overflow:hidden;word-break:break-word}.wt-slot:hover{filter:brightness(1.08)}.wt-slot.empty{background:var(--paper2)}.wt-slot.recreo{background:var(--paper3);cursor:default;font-size:.65rem;font-style:italic;color:var(--ink3);height:36px}.wt-slot .ws-area{font-weight:800;color:#fff;text-align:center;line-height:1.2}.wt-slot .ws-done{position:absolute;top:3px;right:4px;width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:.6rem;color:var(--teal);font-weight:900}.wt-slot.split-top{border-bottom:1px dashed rgba(255,255,255,.35);height:28px}.wt-slot.split-bot{height:24px}
.rpicker-wrap{user-select:none}.rpicker-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.rpicker-month{font-weight:800;font-size:.9rem}.rpicker-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}.rpicker-dn{text-align:center;font-size:.62rem;font-weight:800;color:var(--ink3);text-transform:uppercase;padding:3px 0}.rpicker-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:7px;cursor:pointer;font-size:.78rem;font-weight:600;transition:background .12s}.rpicker-day:hover:not(.rp-other){background:var(--paper2)}.rp-other{color:var(--paper3);pointer-events:none}.rp-weekend{opacity:.45}.rp-start,.rp-end{background:var(--accent)!important;color:#fff!important}.rp-start{border-radius:7px 0 0 7px}.rp-end{border-radius:0 7px 7px 0}.rp-start.rp-end{border-radius:7px!important}.rp-in-range{background:rgba(232,82,10,.13);color:var(--accent);border-radius:0}.rp-today{outline:2px solid var(--blue2);outline-offset:-2px}.range-display{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--paper2);border-radius:var(--r);margin-bottom:12px;font-size:.82rem;font-weight:600;flex-wrap:wrap}

<body>
<div id="app">
<header>
  <div class="logo"><div class="logo-mark">📋</div><div><div class="logo-text">SiurotPlan</div><div class="logo-sub">Programación docente</div></div></div>
  <div class="hdr-actions">
    <button class="hdr-btn" onclick="goToday()">📅 Hoy</button>
    <button class="hdr-btn" onclick="switchTab('horario')">🕐 Horario</button>
    <button class="hdr-btn" onclick="openSettings()">⚙️</button>
  </div>
</header>
<div class="settings-scrim" id="stg-scrim" onclick="closeSettings()"></div>
<div class="settings-panel" id="stg-panel">
  <div class="stg-title"><span>Ajustes</span><button class="btn btn-ghost btn-sm" onclick="closeSettings()">✕</button></div>
  <div class="stg-sec"><h3>👤 Personal</h3>
    <div class="fg"><label>Nombre</label><input type="text" id="cfg-nombre" oninput="savePers()"></div>
    <div class="fg"><label>Puesto</label><input type="text" id="cfg-puesto" oninput="savePers()"></div>
    <div class="fg"><label>Centro</label><input type="text" id="cfg-centro" oninput="savePers()"></div>
    <div class="fg"><label>Curso escolar</label><input type="text" id="cfg-curso" oninput="savePers()"></div>
  </div><hr class="divider">
  <div class="stg-sec"><h3>🎛️ Preferencias</h3>
    <div class="toggle-row"><span class="toggle-label">🔊 Sonido</span><label class="tgl"><input type="checkbox" id="tgl-sound" checked onchange="saveCfg()"><span class="tgl-sl"></span></label></div>
    <div class="toggle-row"><span class="toggle-label">🌙 Modo oscuro</span><label class="tgl"><input type="checkbox" id="tgl-dark" onchange="toggleDark()"><span class="tgl-sl"></span></label></div>
  </div><hr class="divider">
  <div class="stg-sec"><h3>💾 Copia de seguridad</h3>
    <div style="background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.3);border-radius:var(--r);padding:10px 12px;margin-bottom:10px;font-size:.8rem;line-height:1.5;color:var(--ink2)">⚠️ <strong>Importante:</strong> Los datos se guardan en este navegador. Si borras la caché, se perderán. <strong>Exporta regularmente.</strong></div>
    <div style="display:flex;flex-direction:column;gap:7px">
      <button class="btn btn-ink btn-sm" onclick="exportDB()">⬇️ Exportar datos</button>

<script>
'use strict';
const TAP=new Audio('https://raw.githubusercontent.com/ManuelVS8/Efectos_audio/refs/heads/main/Tap.mp3');
function tap(){if(!cfg.sound)return;try{TAP.currentTime=0;TAP.play();}catch(e){}}
document.addEventListener('click',e=>{if(e.target.closest('button,.btn,.nav-tab,.bnav-btn,.cal-day,.area-pill,.area-sel-btn,.sg-cell,.tgl-sl,.dt-header,.cs-dot'))tap();});

const DIAS_K=['lunes','martes','miercoles','jueves','viernes'],DIAS_N=['Lunes','Martes','Miércoles','Jueves','Viernes'],DIAS_C=['Lu','Ma','Mi','Ju','Vi','Sá','Do'],MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'],COLORS=['#e53e3e','#d97706','#059669','#1d4ed8','#7c3aed','#db2777','#0891b2','#65a30d','#9333ea','#f97316','#0d9488','#854d0e'];
let colorIdx=0;function nextColor(){const c=COLORS[colorIdx%COLORS.length];colorIdx++;return c;}

const KEY='siurotplan_pro_v4';
let DB={personal:{nombre:'',puesto:'',centro:'C.E.I.P. Manuel Siurot',curso:'2025/2026'},config:{sound:true,dark:false},areas:[],horario:{},plan:{},notas:{},tramoBase:[]};
let cfg={sound:true,dark:false};

function saveDB(){try{localStorage.setItem(KEY,JSON.stringify(DB));}catch(e){}}
function loadDB(){try{const r=localStorage.getItem(KEY);if(r){const p=JSON.parse(r);DB={...DB,...p};['areas','horario','plan','notas','personal','config','tramoBase'].forEach(k=>{if(p[k]!==undefined)DB[k]=p[k];});}}catch(e){}cfg=DB.config||{sound:true,dark:false};}
function firstTime(){return !localStorage.getItem(KEY);}

function openSettings(){tap();document.getElementById('stg-panel').classList.add('open');document.getElementById('stg-scrim').classList.add('open');}
function closeSettings(){document.getElementById('stg-panel').classList.remove('open');document.getElementById('stg-scrim').classList.remove('open');}
function savePers(){DB.personal.nombre=document.getElementById('cfg-nombre').value;DB.personal.puesto=document.getElementById('cfg-puesto').value;DB.personal.centro=document.getElementById('cfg-centro').value;DB.personal.curso=document.getElementById('cfg-curso').value;saveDB();}
function saveCfg(){DB.config.sound=document.getElementById('tgl-sound').checked;cfg.sound=DB.config.sound;saveDB();}
function toggleDark(){DB.config.dark=document.getElementById('tgl-dark').checked;cfg.dark=DB.config.dark;applyDark();saveDB();}
function applyDark(){document.body.classList.toggle('dark',!!cfg.dark);}
function loadStgUI(){document.getElementById('cfg-nombre').value=DB.personal.nombre||'';document.getElementById('cfg-puesto').value=DB.personal.puesto||'';document.getElementById('cfg-centro').value=DB.personal.centro||'';document.getElementById('cfg-curso').value=DB.personal.curso||'';document.getElementById('tgl-sound').checked=cfg.sound!==false;document.getElementById('tgl-dark').checked=!!cfg.dark;}
function exportDB(){tap();const b=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='siurotplan.json';a.click();}
function importDB(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{DB=JSON.parse(ev.target.result);saveDB();loadDB();loadStgUI();showApp();closeSettings();toast('✅ Datos importados');}catch{toast('❌ Error');}};r.readAsText(f);}

// FIX: Action functions declared globally to work natively with HTML onclick
function actionResetDB(){localStorage.removeItem(KEY);location.reload();}
function actionClearHorario(){pushUndo();Object.keys(DB.horario).forEach(d=>{DB.horario[d]=DB.horario[d].map(s=>({id:s.id,inicio:s.inicio,fin:s.fin,areaId:null,split:false,splitAId:null,splitBId:null,recreo:s.recreo||false}));});DB.plan={};DB.notas={};saveDB();closeSettings();renderTab();toast('✅ Horario limpiado');}

function resetDB(){openConfirm('¿Borrar TODO?\nSe eliminarán horario, programación Y áreas.','🗑️ Sí, borrar todo','actionResetDB');}
function clearHorario(){openConfirm('¿Limpiar el horario?\nSe borrará el horario y programación, pero se conservarán las áreas.','🗓️ Sí, limpiar','actionClearHorario');}

function toast(msg){const t=document.createElement('div');t.style.cssText='position:fixed;bottom:86px;left:50%;transform:translateX(-50%);background:#0f1c2e;color:#fff;padding:9px 18px;border-radius:30px;font-weight:600;font-size:.82rem;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3);white-space:nowrap;';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}

/* MODAL SYSTEM - FULLY FIXED */
function openModal(html){const r=document.getElementById('modal-root');r.innerHTML=`<div class="overlay" id="modal-ov"><div class="modal">${html}</div></div>`;document.getElementById('modal-ov').addEventListener('click',e=>{if(e.target.id==='modal-ov')closeModal();});}
function closeModal(){document.getElementById('modal-root').innerHTML='';}
function openConfirm(msg,labelOk,actionFnName,labelCancel){const lines=msg.split('\n').filter(Boolean).map(l=>`<p style="margin:0 0 7px 0;line-height:1.55">${l}</p>`).join('');openModal(`<div class="modal-title" style="font-size:1rem">⚠️ Confirmar acción</div><div style="margin-bottom:16px;color:var(--ink2)">${lines}</div><div class="modal-actions"><button class="btn btn-accent" onclick="closeModal();${actionFnName}()">${labelOk||'Aceptar'}</button><button class="btn btn-ghost" onclick="closeModal()">${labelCancel||'Cancelar'}</button></div>`);}

function uid(){return Math.random().toString(36).substr(2,9);}
function fmtDate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function getMonday(d){const dt=new Date(d);const day=dt.getDay();const diff=day===0?-6:1-day;dt.setDate(dt.getDate()+diff);return dt;}
function diaKey(d){const m=[null,'lunes','martes','miercoles','jueves','viernes',null,null];return m[d.getDay()]||null;}
function getArea(id){return DB.areas.find(a=>a.id===id)||null;}
function areaLabel(id){const a=getArea(id);if(!a)return '—';if(a.grupo)return `${a.nombre} (${a.grupo})`;return a.nombre;}
function areaLabelShort(id,max=10){const a=getArea(id);if(!a)return '—';let txt=a.grupo?`${a.nombre} (${a.grupo})`:a.nombre;if(txt.length>max)txt=txt.substring(0,max-1)+'…';return txt;}
function cellFontSize(text,base=0.75,min=0.48){if(!text)return base+'rem';const len=text.length;if(len<=10)return base+'rem';if(len<=15)return(base*.88)+'rem';if(len<=20)return(base*.75)+'rem';if(len<=28)return(base*.62)+'rem';return Math.max(min,base*.5)+'rem';}
function slotMin(s){const[h1,m1]=s.inicio.split(':').map(Number);const[h2,m2]=s.fin.split(':').map(Number);return Math.max(0,(h2*60+m2)-(h1*60+m1));}

loadDB();
let curTab='calendario',curMonth=new Date().getMonth(),curYear=new Date().getFullYear(),selDate=new Date(),areaViewId=null,paintingAreaId=null,obStep=0;

function init(){applyDark();loadStgUI();if(firstTime())showOnboarding();else showApp();}

function showOnboarding(){document.getElementById('view-ob').style.display='block';document.getElementById('view-app').style.display='none';obStep=0;renderOB();}
function renderOB(){document.getElementById('view-ob').innerHTML=[renderOB0,renderOB1,renderOB2,renderOB3,renderOB4][obStep]();}

function obShell(step,total,icon,title,desc,body,btns){const pct=Math.round(step/(total-1)*100);const dots=Array.from({length:total},(_,i)=>`<div class="ob-dot ${i===step?'active':''}"></div>`).join('');return `<div class="ob-wrap"><div class="card ob-card" style="text-align:left"><div class="ob-prog"><div class="ob-prog-fill" style="width:${pct}%"></div></div><div class="ob-steps" style="justify-content:flex-start;margin-bottom:16px">${dots}<span style="margin-left:auto;font-size:.72rem;color:var(--ink3);font-weight:700">Paso ${step+1} de ${total}</span></div><div style="display:flex;align-items:center;gap:12px;margin-bottom:12px"><span style="font-size:2rem">${icon}</span><div style="margin:0;font-size:1.2rem;text-align:left;font-family:'Playfair Display',serif">${title}</div></div><p class="ob-desc" style="text-align:left">${desc}</p>${body}<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;border-top:1px solid var(--paper3);padding-top:16px">${btns}</div></div></div>`;}

function renderOB0(){return obShell(0,5,'👋','Bienvenido/a a SiurotPlan','Tu cuaderno de planificación docente digital. Vamos a configurarlo juntos en 4 sencillos pasos.',`<div style="display:flex;flex-direction:column;gap:10px"><div style="background:var(--paper2);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;gap:10px"><span style="font-size:1.2rem">📚</span><div><strong>Paso 1</strong> — Crea tus áreas</div></div><div style="background:var(--paper2);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;gap:10px"><span style="font-size:1.2rem">🕐</span><div><strong>Paso 2</strong> — Define los tramos horarios</div></div><div style="background:var(--paper2);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;gap:10px"><span style="font-size:1.2rem">🎨</span><div><strong>Paso 3</strong> — Asigna áreas al horario</div></div></div>`,`<button class="btn btn-accent" style="margin-left:auto" onclick="obStep=1;renderOB()">Empezar →</button>`);}

function renderOB1(){return obShell(1,5,'👤','Tus datos','Aparecerán en los PDFs. Puedes cambiarlos luego desde ⚙️ Ajustes.',`<div class="fg"><label>Nombre completo</label><input type="text" id="ob-nombre" value="${DB.personal.nombre}" placeholder="Ej: Ana García López"></div><div class="fg"><label>Puesto</label><input type="text" id="ob-puesto" value="${DB.personal.puesto}" placeholder="Ej: Maestra de Primaria"></div><div class="fg"><label>Centro educativo</label><input type="text" id="ob-centro" value="${DB.personal.centro}" placeholder="Nombre del colegio"></div><div class="fg"><label>Grupo / tutoría</label><input type="text" id="ob-grupo" value="${DB.personal.curso}" placeholder="Ej: 3ºA, 5ºB..."></div>`,`<button class="btn btn-ghost" onclick="obStep=0;renderOB()">← Atrás</button><button class="btn btn-accent" style="margin-left:auto" onclick="DB.personal.nombre=document.getElementById('ob-nombre').value.trim();DB.personal.puesto=document.getElementById('ob-puesto').value.trim();DB.personal.centro=document.getElementById('ob-centro').value.trim();DB.personal.curso=document.getElementById('ob-grupo').value.trim();saveDB();loadStgUI();obStep=2;renderOB()">Siguiente →</button>`);}

function renderOB2(){
const initColor=COLORS[colorIdx%COLORS.length];
const list=DB.areas.map(a=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--paper2);border-radius:8px;margin-bottom:5px"><span style="width:14px;height:14px;border-radius:50%;background:${a.color};flex-shrink:0"></span><div style="flex:1;font-weight:700;font-size:.88rem">${a.nombre}${a.grupo?' <span style="font-weight:400;color:var(--ink3);font-size:.78rem">('+a.grupo+')</span>':''}</div><button class="btn btn-ghost btn-xs" onclick="obEditArea('${a.id}')">✏️</button><button class="btn btn-danger btn-xs" onclick="DB.areas=DB.areas.filter(x=>x.id!=='${a.id}');saveDB();renderOB()">✕</button></div>`).join('')||'<div style="text-align:center;padding:16px;color:var(--ink3)">Aún no has añadido ningún área.</div>';
const swatches=COLORS.map(c=>`<div class="cs-dot" style="background:${c}" onclick="selColor('${c}','ob-area')"></div>`).join('');
return obShell(2,5,'📚','Crea tus áreas','Añade las asignaturas que impartes. El aula/grupo aparecerá en el horario junto al nombre.',`<div style="margin-bottom:14px">${list}</div><div style="background:var(--paper2);border-radius:var(--r);padding:14px;border:1px dashed var(--paper3)"><div class="sec-label" style="margin-bottom:10px">➕ Nueva área</div><div style="display:flex;gap:8px;margin-bottom:10px"><label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-weight:600;font-size:.82rem"><input type="radio" name="ob-tipo" value="docencia" checked> 📖 Docencia</label><label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-weight:600;font-size:.82rem"><input type="radio" name="ob-tipo" value="nd"> 🗂️ No doc.</label></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg" style="margin:0"><label>Nombre del área</label><input type="text" id="ob-area-nombre" placeholder="Ej: Matemáticas"></div><div class="fg" style="margin:0"><label>Aula / Grupo</label><input type="text" id="ob-area-grupo" placeholder="Ej: 3ºA" style="background:var(--paper);color:var(--ink2);font-style:italic"></div></div><div class="fg" style="margin-top:10px"><label>Color</label><div class="color-strip" id="ob-area-strip">${swatches}</div><div class="color-picker-row"><label>🎨 Libre:</label><input type="color" id="ob-area-picker" value="${initColor}" oninput="onPickerChange('ob-area')"><input type="text" id="ob-area-hex" class="color-hex-input" value="${initColor.toUpperCase()}" maxlength="7" oninput="onHexChange('ob-area')"><input type="hidden" id="ob-area-color" value="${initColor}"></div></div><button class="btn btn-accent" style="width:100%;margin-top:4px" onclick="obAddArea()">✚ Añadir área</button></div>`,`<button class="btn btn-ghost" onclick="obStep=1;renderOB()">← Atrás</button><button class="btn btn-ink" style="margin-left:auto" onclick="obStep=3;renderOB()" ${DB.areas.length?'':'disabled'}>${DB.areas.length?'Siguiente →':'Añade al menos un área'}</button>`);
}
function obAddArea(){const n=document.getElementById('ob-area-nombre').value.trim();const g=document.getElementById('ob-area-grupo').value.trim()||'';if(!n){toast('⚠️ Escribe el nombre');return;}const t=document.querySelector('input[name="ob-tipo"]:checked')?.value||'docencia';const c=document.getElementById('ob-area-color').value||nextColor();DB.areas.push({id:uid(),nombre:n,tipo:t,grupo:g,color:c});colorIdx++;saveDB();document.getElementById('ob-area-nombre').value='';document.getElementById('ob-area-grupo').value='';renderOB();toast(`✅ "${n}" añadida`);}
function obEditArea(id){const a=DB.areas.find(x=>x.id===id);if(!a)return;openModal(`<div class="modal-title">✏️ Editar área</div><div class="fg"><label>Nombre</label><input type="text" id="ea-nombre" value="${a.nombre}"></div><div class="fg"><label>Aula / Grupo</label><input type="text" id="ea-grupo" value="${a.grupo||''}" placeholder="Ej: 3ºA"></div><div class="fg"><label>Tipo</label><div style="display:flex;gap:12px"><label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-weight:600"><input type="radio" name="ea-tipo" value="docencia" ${a.tipo==='docencia'?'checked':''}> 📖 Docencia</label><label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-weight:600"><input type="radio" name="ea-tipo" value="nd" ${a.tipo!=='docencia'?'checked':''}> 🗂️ No doc.</label></div></div>${colorModalHTML(a.color,'ea')}<div class="modal-actions"><button class="btn btn-ink" onclick="const i=DB.areas.findIndex(x=>x.id==='${id}');if(i>=0){DB.areas[i].nombre=document.getElementById('ea-nombre').value.trim()||DB.areas[i].nombre;DB.areas[i].grupo=document.getElementById('ea-grupo').value.trim();DB.areas[i].tipo=document.querySelector('input[name=ea-tipo]:checked')?.value||'docencia';DB.areas[i].color=document.getElementById('ea-color').value;saveDB();}closeModal();renderOB()">💾 Guardar</button><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button></div>`);setTimeout(()=>selColor(a.color,'ea'),40);}

function renderOB3(){
if(!DB.tramoBase)DB.tramoBase=[];
const list=DB.tramoBase.map(t=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:${t.recreo?'var(--paper3)':'var(--paper2)'};border-radius:8px;margin-bottom:5px;${t.recreo?'font-style:italic':''}"><span style="font-family:monospace;font-size:.78rem;color:var(--ink3)">${t.inicio}–${t.fin}</span><span style="flex:1;font-weight:${t.recreo?'400':'700'};font-size:.85rem">${t.recreo?'☀️ Recreo':'Sesión'}</span><button class="btn btn-danger btn-xs" onclick="DB.tramoBase=DB.tramoBase.filter(x=>x.id!=='${t.id}');saveDB();renderOB()">✕</button></div>`).join('')||'<div style="text-align:center;padding:16px;color:var(--ink3)">Aún no hay tramos.</div>';
const hasTramos=DB.tramoBase.length>0;
return obShell(3,5,'🕐','Define los tramos del día','Añade los bloques horarios. Se aplicarán a todos los días.',`<div style="margin-bottom:14px">${list}</div><div style="background:var(--paper2);border-radius:var(--r);padding:14px;border:1px dashed var(--paper3)"><div class="sec-label" style="margin-bottom:10px">➕ Nuevo tramo</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px"><div class="fg" style="margin:0"><label>Inicio</label><input type="time" id="ob-t-inicio" value="09:00"></div><div class="fg" style="margin:0"><label>Fin</label><input type="time" id="ob-t-fin" value="10:00"></div></div><div style="display:flex;gap:8px;margin-top:4px"><button class="btn btn-ink btn-sm" style="flex:1" onclick="obAddTramo(false)">➕ Añadir sesión</button><button class="btn btn-ghost btn-sm" style="flex:1" onclick="obAddTramo(true)">☀️ Añadir recreo</button></div></div>`,`<button class="btn btn-ghost" onclick="obStep=2;renderOB()">← Atrás</button><button class="btn btn-ink" style="margin-left:auto" onclick="buildHorarioFromTramos();obStep=4;renderOB()" ${hasTramos?'':'disabled'}>${hasTramos?'Siguiente →':'Añade al menos un tramo'}</button>`);
}
function obAddTramo(esRecreo){const inicio=document.getElementById('ob-t-inicio').value||'09:00';const fin=document.getElementById('ob-t-fin').value||'10:00';if(inicio>=fin){toast('⚠️ Fin debe ser posterior');return;}if(!DB.tramoBase)DB.tramoBase=[];DB.tramoBase.push({id:uid(),inicio,fin,recreo:esRecreo});DB.tramoBase.sort((a,b)=>a.inicio.localeCompare(b.inicio));saveDB();document.getElementById('ob-t-inicio').value=fin;renderOB();toast(esRecreo?'☀️ Recreo añadido':'✅ Tramo añadido');}
function buildHorarioFromTramos(){DIAS_K.forEach(dia=>{const existing=DB.horario[dia]||[];DB.horario[dia]=(DB.tramoBase||[]).map(t=>{const ex=existing.find(s=>s.inicio===t.inicio&&s.fin===t.fin);if(ex)return{...ex,recreo:t.recreo};return{id:uid(),inicio:t.inicio,fin:t.fin,areaId:null,split:false,splitAId:null,splitBId:null,recreo:t.recreo};});});saveDB();}

function renderOB4(){return obShell(4,5,'🎨','Asigna las áreas al horario','Elige un área de la paleta y pulsa las celdas para asignarla.',`<div style="margin-top:4px">${renderHorarioEditor(true)}</div>`,`<button class="btn btn-ghost" onclick="obStep=3;renderOB()">← Atrás</button><button class="btn btn-accent" style="margin-left:auto" onclick="saveDB();showApp();toast('✅ ¡Todo listo!')">🚀 ¡Comenzar a planificar!</button>`);}

function colorModalHTML(init,idPrefix){const sw=COLORS.map(c=>`<div class="cs-dot" style="background:${c}" onclick="selColor('${c}','${idPrefix}')"></div>`).join('');return `<div class="fg"><label>Color</label><div class="color-strip" id="${idPrefix}-strip">${sw}</div><div class="color-picker-row"><label>🎨 Libre:</label><input type="color" id="${idPrefix}-picker" value="${init}" oninput="onPickerChange('${idPrefix}')"><input type="text" id="${idPrefix}-hex" class="color-hex-input" value="${init}" maxlength="7" oninput="onHexChange('${idPrefix}')"><input type="hidden" id="${idPrefix}-color" value="${init}"></div></div>`;}
function selColor(c,pfx){const s=document.getElementById(pfx+'-strip');if(s)s.querySelectorAll('.cs-dot').forEach(d=>d.classList.toggle('sel',d.dataset.c===c));document.getElementById(pfx+'-color').value=c;document.getElementById(pfx+'-picker').value=c;document.getElementById(pfx+'-hex').value=c.toUpperCase();}
function onPickerChange(pfx){const c=document.getElementById(pfx+'-picker').value;document.getElementById(pfx+'-color').value=c;document.getElementById(pfx+'-hex').value=c.toUpperCase();const s=document.getElementById(pfx+'-strip');if(s)s.querySelectorAll('.cs-dot').forEach(d=>d.classList.remove('sel'));}
function onHexChange(pfx){let v=document.getElementById(pfx+'-hex').value.trim();if(!v.startsWith('#'))v='#'+v;if(/^#[0-9A-Fa-f]{6}$/.test(v)){document.getElementById(pfx+'-color').value=v;document.getElementById(pfx+'-picker').value=v;const s=document.getElementById(pfx+'-strip');if(s)s.querySelectorAll('.cs-dot').forEach(d=>d.classList.toggle('sel',d.dataset.c===v));}}

let undoStack=null,undoTimer=null;
function pushUndo(){undoStack=JSON.stringify({areas:DB.areas,horario:DB.horario});const btn=document.getElementById('undo-btn');if(btn){btn.style.display='flex';clearTimeout(undoTimer);undoTimer=setTimeout(()=>{btn.style.display='none';undoStack=null;},6000);}}
function doUndo(){if(!undoStack){toast('No hay nada que deshacer');return;}const prev=JSON.parse(undoStack);DB.areas=prev.areas;DB.horario=prev.horario;undoStack=null;document.getElementById('undo-btn').style.display='none';saveDB();renderTab();toast('↩ Deshecho');}

function showApp(){document.getElementById('view-ob').style.display='none';document.getElementById('view-app').style.display='block';renderApp();}
function renderApp(){document.getElementById('view-app').innerHTML=`<div class="nav-tabs" id="nav-tabs"><button class="nav-tab ${curTab==='calendario'?'active':''}" onclick="switchTab('calendario')"><span class="ti">🗓️</span>Mes</button><button class="nav-tab ${curTab==='semana'?'active':''}" onclick="switchTab('semana')"><span class="ti">📅</span>Semana</button><button class="nav-tab ${curTab==='dia'?'active':''}" onclick="switchTab('dia')"><span class="ti">📋</span>Día</button><button class="nav-tab ${curTab==='area'?'active':''}" onclick="switchTab('area')"><span class="ti">📖</span>Por área</button><button class="nav-tab ${curTab==='resumen'?'active':''}" onclick="switchTab('resumen')"><span class="ti">📊</span>Stats</button></div><div id="tab-body"></div>`;renderTab();}
function switchTab(t){tap();curTab=t;document.querySelectorAll('.nav-tab').forEach((b,i)=>b.classList.toggle('active',['calendario','semana','dia','area','resumen'][i]===t));renderTab();}
function setbn(id){document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));document.getElementById(id)?.classList.add('active');}
function renderTab(){const c=document.getElementById('tab-body');if(!c)return;if(curTab==='calendario')c.innerHTML=renderCal();else if(curTab==='semana')c.innerHTML=renderSemana();else if(curTab==='dia')c.innerHTML=renderDia();else if(curTab==='area')c.innerHTML=renderAreaView();else if(curTab==='horario'){c.innerHTML=renderHorarioTab();}else if(curTab==='resumen')c.innerHTML=renderResumen();}
function goToday(){tap();selDate=new Date();curMonth=selDate.getMonth();curYear=selDate.getFullYear();curTab='calendario';renderApp();}

function renderCal(){
const hoy=new Date();const pd=new Date(curYear,curMonth,1);const dm=new Date(curYear,curMonth+1,0).getDate();let di=pd.getDay();if(di===0)di=7;di--;const prev=new Date(curYear,curMonth,0).getDate();let cells='';
for(let i=di-1;i>=0;i--)cells+=`<div class="cal-day other"><span>${prev-i}</span></div>`;
for(let d=1;d<=dm;d++){const dk=`${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const isH=d===hoy.getDate()&&curMonth===hoy.getMonth()&&curYear===hoy.getFullYear();const isS=d===selDate.getDate()&&curMonth===selDate.getMonth()&&curYear===selDate.getFullYear();const plan=DB.plan[dk]||{};const fills=Object.values(plan).filter(v=>v.texto);const dkKey=diaKey(new Date(curYear,curMonth,d));const daySlots=(dkKey?DB.horario[dkKey]:[])||[];const playable=daySlots.filter(s=>!s.recreo);const allDone=playable.length>0&&playable.every(s=>{if(s.split)return(plan[s.id+'_a']?.texto)&&(plan[s.id+'_b']?.texto);return plan[s.id]?.texto;});const dots=fills.slice(0,4).map(()=>`<div class="dot" style="background:${isS?'rgba(255,255,255,.7)':'var(--blue2)'}"></div>`).join('');const dow=new Date(curYear,curMonth,d).getDay();
cells+=`<div class="cal-day ${isH&&!isS?'today':''} ${isS?'sel':''} ${dow===0||dow===6?'weekend':''}" onclick="selDate=new Date(curYear,curMonth,${d});renderTab()">${allDone?'<span class="day-check">✓</span>':''}<span>${d}</span>${fills.length&&!allDone?`<div class="dot-row">${dots}</div>`:''}</div>`;}
const tot=di+dm;const sig=tot%7===0?0:7-(tot%7);for(let i=1;i<=sig;i++)cells+=`<div class="cal-day other"><span>${i}</span></div>`;
return `<div class="card"><div class="cal-nav"><button class="btn btn-ghost btn-sm" onclick="curMonth--;if(curMonth<0){curMonth=11;curYear--;}renderTab()">‹</button><div class="cal-month">${MESES[curMonth]} ${curYear}</div><button class="btn btn-ghost btn-sm" onclick="curMonth++;if(curMonth>11){curMonth=0;curYear++;}renderTab()">›</button></div><div class="cal-grid-m">${DIAS_C.map(d=>`<div class="cal-dn">${d}</div>`).join('')}${cells}</div></div><div class="card" style="cursor:pointer;background:linear-gradient(135deg,var(--ink),var(--ink2));color:#fff;padding:14px 18px" onclick="switchTab('dia')"><div class="flex-between"><div><div style="font-size:.68rem;opacity:.5;text-transform:uppercase;margin-bottom:3px">Abrir planificación</div><div style="font-family:'Playfair Display',serif">${selDate.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</div></div><span style="font-size:1.4rem;opacity:.6">→</span></div></div>`;
}

function renderSemana(){
const hoy=new Date();const lunes=getMonday(selDate);const days=Array.from({length:5},(_,i)=>{const d=new Date(lunes);d.setDate(d.getDate()+i);return d;});const refSlots=DB.horario['lunes']||[];
if(!refSlots.length)return `<div class="card"><div class="empty"><div class="ei">🕐</div><p>Sin horario.</p></div></div>`;
let bodyRows='';refSlots.forEach(refSlot=>{if(refSlot.recreo){bodyRows+=`<tr><td class="wt-time-cell">☀️</td><td colspan="5" style="text-align:center;padding:6px;background:var(--paper2);font-size:.7rem;font-style:italic;color:var(--ink3)">RECREO</td></tr>`;return;}
let cells='';days.forEach(d=>{const dk=fmtDate(d);const dkKey=diaKey(d);const slots=(dkKey?DB.horario[dkKey]:[])||[];const plan=DB.plan[dk]||{};const slot=slots.find(s=>s.inicio===refSlot.inicio&&s.fin===refSlot.fin);
if(!slot){cells+=`<td><div class="wt-slot empty"></div></td>`;return;}
if(slot.split){const aA=getArea(slot.splitAId);const aB=getArea(slot.splitBId);const mid=calcMid(slot.inicio,slot.fin);cells+=`<td><div class="wt-slot split-top has-area" style="background:${aA?aA.color:'#94a3b8'}" onclick="selDate=new Date('${dk}T12:00:00');switchTab('dia')"><span class="ws-area" style="font-size:${cellFontSize(areaLabelShort(slot.splitAId,9),.62,.42)}">${areaLabelShort(slot.splitAId,9)}</span></div><div class="wt-slot split-bot has-area" style="background:${aB?aB.color:'#94a3b8'}" onclick="selDate=new Date('${dk}T12:00:00');switchTab('dia')"><span class="ws-area" style="font-size:${cellFontSize(areaLabelShort(slot.splitBId,9),.62,.42)}">${areaLabelShort(slot.splitBId,9)}</span></div></td>`;return;}
const area=getArea(slot.areaId);const done=!!(plan[slot.id]?.texto);const bg=area?area.color:'var(--paper2)';const lbl=area?areaLabel(slot.areaId):'';
cells+=`<td><div class="wt-slot ${area?'has-area':'empty'}" style="${area?`background:${bg}`:''}" onclick="selDate=new Date('${dk}T12:00:00');switchTab('dia')">${area?`<span class="ws-area" style="font-size:${cellFontSize(lbl,.68,.42)}">${lbl.length>14?lbl.substring(0,13)+'…':lbl}</span>`:''}</div></td>`;});
bodyRows+=`<tr><td class="wt-time-cell">${refSlot.inicio}<br>${refSlot.fin}</td>${cells}</tr>`;});
return `<div class="card" style="padding:14px 16px"><div class="flex-between" style="margin-bottom:12px;flex-wrap:wrap;gap:8px"><div><div class="sec-label">Vista semanal</div></div><div class="flex-row"><button class="btn btn-ghost btn-sm" onclick="selDate=new Date(selDate.getFullYear(),selDate.getMonth(),selDate.getDate()-7);renderTab()">‹</button><button class="btn btn-ghost btn-sm" onclick="selDate=new Date(selDate.getFullYear(),selDate.getMonth(),selDate.getDate()+7);renderTab()">›</button></div></div><div class="week-view-wrap"><table class="week-table"><thead><tr><th class="wt-time">Hora</th>${days.map(d=>`<th><div class="week-day-hdr">${DIAS_N[['lunes','martes','miercoles','jueves','viernes'].indexOf(diaKey(d))]}</div></th>`).join('')}</tr></thead><tbody>${bodyRows}</tbody></table></div></div>`;
}

function calcMid(inicio,fin){const[h1,m1]=inicio.split(':').map(Number);const[h2,m2]=fin.split(':').map(Number);const mid=Math.round(((h1*60+m1)+(h2*60+m2))/2);return `${String(Math.floor(mid/60)).padStart(2,'0')}:${String(mid%60).padStart(2,'0')}`;}

function renderDia(){
const dk=fmtDate(selDate);const dkKey=diaKey(selDate);const slots=dkKey?(DB.horario[dkKey]||[]):[];const plan=DB.plan[dk]||{};const nota=DB.notas[dk]||'';const isWeekend=!dkKey;
let body='';if(isWeekend){body=`<div class="no-horario"><div style="font-size:2.2rem;margin-bottom:8px">🏖️</div><p style="font-weight:700">Fin de semana</p></div>`;}else if(!slots.length){body=`<div class="no-horario"><p style="font-weight:700">Sin horario</p></div>`;}else{body=slots.map(s=>{if(s.recreo)return `<div style="text-align:center;padding:7px 0;font-size:.78rem;font-style:italic;color:var(--ink3)">☀️ RECREO</div>`;if(s.split){const mid=calcMid(s.inicio,s.fin);return renderHalfSlot(s.id+'_a',s.id+'_b',s.splitAId,s.splitBId,s.inicio,mid,s.fin,dk,plan);}return renderSlotCard(s,dk,plan);}).join('');}
return `<div class="card" style="padding:13px 16px"><div class="day-nav"><button class="btn btn-ghost btn-sm" onclick="selDate=new Date(selDate.getFullYear(),selDate.getMonth(),selDate.getDate()-1);renderTab()">‹</button><div class="dn-label">${selDate.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</div><button class="btn btn-ghost btn-sm" onclick="selDate=new Date(selDate.getFullYear(),selDate.getMonth(),selDate.getDate()+1);renderTab()">›</button></div></div><div id="slots-container">${body}</div><div class="card"><label>📝 Notas del día</label><textarea placeholder="Observaciones..." style="width:100%;min-height:70px;resize:vertical;margin-top:6px" onchange="DB.notas['${dk}']=this.value;saveDB()">${nota}</textarea></div>`;
}
function renderSlotCard(s,dk,plan){const p=plan[s.id]||{};const area=getArea(s.areaId);const color=area?area.color:'#6a8aaa';const lbl=area?areaLabel(s.areaId):'Sin área';return `<div class="day-tramo"><div class="dt-header" onclick="this.nextElementSibling.classList.toggle('open')"><div class="dt-time" style="background:${color}">${s.inicio}<br><span style="opacity:.7;font-size:.62rem">${s.fin}</span></div><div class="dt-name">${lbl}</div><span class="dt-status">${p.texto?'▾':'▸'}</span></div><div class="dt-body ${p.texto?'open':''}"><textarea placeholder="Actividad..." rows="3" style="width:100%;margin-top:4px" onchange="if(!DB.plan['${dk}'])DB.plan['${dk}']={};if(!DB.plan['${dk}']['${s.id}'])DB.plan['${dk}']['${s.id}']={};DB.plan['${dk}']['${s.id}'].texto=this.value;saveDB()">${p.texto||''}</textarea></div></div>`;}
function renderHalfSlot(idA,idB,areaAId,areaBId,inicio,mid,fin,dk,plan){const pA=plan[idA]||{};const pB=plan[idB]||{};const aA=getArea(areaAId);const aB=getArea(areaBId);return `<div class="day-tramo"><div class="dt-header" onclick="this.nextElementSibling.classList.toggle('open')"><div class="dt-time" style="background:${aA?aA.color:'#65a30d'}">${inicio}<br><span style="opacity:.7;font-size:.62rem">${mid}</span></div><div class="dt-name">${aA?areaLabel(areaAId):'Sin área'}</div><span style="font-size:.65rem;background:var(--paper3);border-radius:6px;padding:2px 7px;color:var(--ink3)">½</span><span class="dt-status">${pA.texto?'▾':'▸'}</span></div><div class="dt-body ${pA.texto?'open':''}"><textarea placeholder="Actividad..." rows="3" style="width:100%;margin-top:4px" onchange="if(!DB.plan['${dk}'])DB.plan['${dk}']={};if(!DB.plan['${dk}']['${idA}'])DB.plan['${dk}']['${idA}']={};DB.plan['${dk}']['${idA}'].texto=this.value;saveDB()">${pA.texto||''}</textarea></div></div><div class="day-tramo"><div class="dt-header" onclick="this.nextElementSibling.classList.toggle('open')"><div class="dt-time" style="background:${aB?aB.color:'#1d4ed8'}">${mid}<br><span style="opacity:.7;font-size:.62rem">${fin}</span></div><div class="dt-name">${aB?areaLabel(areaBId):'Sin área'}</div><span style="font-size:.65rem;background:var(--paper3);border-radius:6px;padding:2px 7px;color:var(--ink3)">½</span><span class="dt-status">${pB.texto?'▾':'▸'}</span></div><div class="dt-body ${pB.texto?'open':''}"><textarea placeholder="Actividad..." rows="3" style="width:100%;margin-top:4px" onchange="if(!DB.plan['${dk}'])DB.plan['${dk}']={};if(!DB.plan['${dk}']['${idB}'])DB.plan['${dk}']['${idB}']={};DB.plan['${dk}']['${idB}'].texto=this.value;saveDB()">${pB.texto||''}</textarea></div></div>`;}

function renderAreaView(){
const areasEnHorario=new Set();Object.values(DB.horario).forEach(slots=>slots.forEach(s=>{if(s.recreo)return;if(s.split){if(s.splitAId)areasEnHorario.add(s.splitAId);if(s.splitBId)areasEnHorario.add(s.splitBId);}else if(s.areaId)areasEnHorario.add(s.areaId);}));
const areasFiltradas=DB.areas.filter(a=>areasEnHorario.has(a.id));if(!areasFiltradas.length)return `<div class="card"><div class="empty"><p>No hay áreas en el horario.</p></div></div>`;
if(!areaViewId||!areasEnHorario.has(areaViewId))areaViewId=areasFiltradas[0].id;const area=getArea(areaViewId);const lunes=getMonday(selDate);
const selector=areasFiltradas.map(a=>`<button class="area-sel-btn ${a.id===areaViewId?'active':''}" style="${a.id===areaViewId?`background:${a.color}`:''}" onclick="areaViewId='${a.id}';renderTab()">${a.nombre}</button>`).join('');
let weekHTML='';
for(let i=0;i<5;i++){const d=new Date(lunes);d.setDate(d.getDate()+i);const dk=fmtDate(d);const dkKey=diaKey(d);const slots=(dkKey?DB.horario[dkKey]:[])||[];const mySlots=[];slots.forEach(s=>{if(s.recreo)return;if(s.split){const mid=calcMid(s.inicio,s.fin);if(s.splitAId===areaViewId)mySlots.push({id:s.id+'_a',inicio:s.inicio,fin:mid});if(s.splitBId===areaViewId)mySlots.push({id:s.id+'_b',inicio:mid,fin:s.fin});}else if(s.areaId===areaViewId){mySlots.push({id:s.id,inicio:s.inicio,fin:s.fin});}});if(!mySlots.length)continue;const plan=DB.plan[dk]||{};const slotsHTML=mySlots.map(sl=>{const p=plan[sl.id]||{};return `<div class="av-slot" style="border-left-color:${area.color}"><div class="av-slot-time">${sl.inicio} – ${sl.fin}</div><textarea placeholder="Actividad..." onchange="if(!DB.plan['${dk}'])DB.plan['${dk}']={};if(!DB.plan['${dk}']['${sl.id}'])DB.plan['${dk}']['${sl.id}']={};DB.plan['${dk}']['${sl.id}'].texto=this.value;saveDB()" style="border-left:3px solid ${area.color}">${p.texto||''}</textarea></div>`;}).join('');weekHTML+=`<div class="av-day-section"><div class="av-day-label">📅 ${d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'short'})}</div>${slotsHTML}</div>`;}
return `<div class="card"><div class="flex-between" style="margin-bottom:12px"><div><div class="sec-label">Vista por área</div><div style="font-family:'Playfair Display',serif;font-size:1rem"><span style="width:12px;height:12px;border-radius:50%;background:${area.color};display:inline-block"></span> ${areaLabel(areaViewId)}</div></div></div><div class="area-selector">${selector}</div></div><div>${weekHTML||'<div class="card"><div class="empty"><p>Sin sesiones esta semana.</p></div></div>'}</div>`;
}

function renderHorarioTab(){return `<div class="card"><div class="flex-between" style="margin-bottom:12px"><div><div style="font-family:'Playfair Display',serif;font-size:1.05rem">Horario Semanal</div><div class="text-sm text-muted">Pinta las sesiones eligiendo un área</div></div><button class="btn btn-ghost btn-sm" onclick="addArea()">+ Nueva área</button></div>${renderHorarioEditor(false)}</div>`;}
function renderHorarioEditor(inline){
const refSlots=DB.horario['lunes']||Object.values(DB.horario)[0]||[];
const areaBtns=DB.areas.map(a=>`<div class="area-pill ${paintingAreaId===a.id?'painting':''}" style="background:${a.color}" onclick="paintingAreaId='${a.id}';renderTab()">${a.nombre}${a.grupo?' ('+a.grupo+')':''}</div>`).join('');
let gridHTML=`<div class="sched-grid"><div class="sg-hdr time-hdr">Hora</div>${DIAS_N.map(d=>`<div class="sg-hdr">${d}</div>`).join('')}`;
refSlots.forEach(refSlot=>{if(refSlot.recreo){gridHTML+=`<div class="sg-time"><span>${refSlot.inicio}</span><span>${refSlot.fin}</span></div><div class="sg-cell recreo">☀️ RECREO</div>`;return;}
gridHTML+=`<div class="sg-time"><span>${refSlot.inicio}</span><span style="opacity:.6">${refSlot.fin}</span></div>`;
DIAS_K.forEach(diaK=>{const dSlots=DB.horario[diaK]||[];const slot=dSlots.find(s=>s.inicio===refSlot.inicio&&s.fin===refSlot.fin);
if(!slot){gridHTML+=`<div class="sg-cell" onclick="cellClick('${diaK}','${refSlot.inicio}','${refSlot.fin}')">+</div>`;return;}
if(slot.split){const aA=getArea(slot.splitAId);const aB=getArea(slot.splitBId);const lblA=areaLabelShort(slot.splitAId,8);const lblB=areaLabelShort(slot.splitBId,8);
gridHTML+=`<div class="sg-cell split"><div class="half top" style="background:${aA?aA.color:'#65a30d'};font-size:${cellFontSize(lblA,.7,.42)}" onclick="halfClick('${diaK}','${slot.id}','A')">${lblA}</div><div class="divider-line"></div><div class="half bot" style="background:${aB?aB.color:'#1d4ed8'};font-size:${cellFontSize(lblB,.7,.42)}" onclick="halfClick('${diaK}','${slot.id}','B')">${lblB}</div><span class="split-indicator">½</span><span class="unsplit-btn" onclick="event.stopPropagation();unsplitSlot('${diaK}','${slot.id}')">⊞</span></div>`;return;}
const area=getArea(slot.areaId);const bg=area?area.color:'var(--paper2)';const lbl=area?areaLabelShort(slot.areaId,12):'+';const fs=area?cellFontSize(areaLabel(slot.areaId),.75,.48):'.75rem';
gridHTML+=`<div class="sg-cell assigned" style="background:${bg};font-size:${fs}" onclick="cellClick('${diaK}','${refSlot.inicio}','${refSlot.fin}')">${lbl}<span class="remove-btn" onclick="event.stopPropagation();removeSlotArea('${diaK}','${slot.id}')">✕</span></div>`;});});
gridHTML+='</div>';
return `<div><div style="margin-bottom:10px"><div class="sec-label" style="margin-bottom:7px">1. Elige un área</div><div class="area-palette">${areaBtns}<div class="area-pill" style="background:#6a8aaa" onclick="paintingAreaId=null;renderTab()">✕ Borrar</div></div></div>${paintingAreaId!==null?`<div class="warn-box">🎨 Pintando: <strong>${paintingAreaId?areaLabel(paintingAreaId):'Borrar'}</strong></div>`:''}<div style="margin-bottom:10px"><div class="sec-label">2. Pulsa las celdas</div><div class="grid-wrap">${gridHTML}</div></div><div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-ghost btn-sm" onclick="addSlotRow()">+ Añadir tramo</button><button class="btn btn-ghost btn-sm" onclick="toggleSplitMode()">⚡ Dividir sesión</button></div></div>`;
}

function cellClick(diaK,inicio,fin){tap();if(!DB.horario[diaK])DB.horario[diaK]=[];let slot=DB.horario[diaK].find(s=>s.inicio===inicio&&s.fin===fin);if(!slot){slot={id:uid(),inicio,fin,areaId:null,split:false,recreo:false};DB.horario[diaK].push(slot);}if(slot.recreo)return;pushUndo();if(paintingAreaId===null){slot.areaId=null;slot.split=false;slot.splitAId=null;slot.splitBId=null;}else{slot.areaId=paintingAreaId;}saveDB();renderTab();}
function halfClick(diaK,slotId,half){tap();const slot=DB.horario[diaK]?.find(s=>s.id===slotId);if(!slot||!slot.split)return;pushUndo();if(paintingAreaId===null){if(half==='A')slot.splitAId=null;else slot.splitBId=null;if(!slot.splitAId&&!slot.splitBId){slot.split=false;slot.areaId=null;}}else{if(half==='A')slot.splitAId=paintingAreaId;else slot.splitBId=paintingAreaId;}saveDB();renderTab();}
function removeSlotArea(diaK,slotId){tap();const slot=DB.horario[diaK]?.find(s=>s.id===slotId);if(!slot)return;pushUndo();slot.areaId=null;slot.split=false;slot.splitAId=null;slot.splitBId=null;saveDB();renderTab();}
function actionUnsplitSlot(diaK,slotId){const slot=DB.horario[diaK]?.find(s=>s.id===slotId);if(!slot)return;pushUndo();slot.areaId=slot.splitAId||slot.splitBId||null;slot.split=false;slot.splitAId=null;slot.splitBId=null;saveDB();renderTab();toast('↩ Reunificada');}
function unsplitSlot(diaK,slotId){tap();openConfirm('¿Reunificar esta sesión?','⊞ Sí',`actionUnsplitSlot('${diaK}','${slotId}')`);}
function toggleSplitMode(){tap();openModal(`<div class="modal-title">⚡ Dividir sesión</div><div class="fg"><label>Día</label><select id="split-dia">${DIAS_K.map((d,i)=>`<option value="${d}">${DIAS_N[i]}</option>`).join('')}</select></div><div class="fg"><label>Sesión</label><select id="split-slot"></select></div><div class="modal-actions"><button class="btn btn-accent" onclick="confirmSplit()">⚡ Dividir</button><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button></div>`);setTimeout(()=>{const dsel=document.getElementById('split-dia');const ssel=document.getElementById('split-slot');const refresh=()=>{const slots=(DB.horario[dsel.value]||[]).filter(s=>!s.recreo&&!s.split);ssel.innerHTML=slots.map(s=>`<option value="${s.id}">${s.inicio}–${s.fin}</option>`).join('');};dsel.addEventListener('change',refresh);refresh();},50);}
function confirmSplit(){const diaK=document.getElementById('split-dia').value;const slotId=document.getElementById('split-slot').value;const slot=DB.horario[diaK]?.find(s=>s.id===slotId);if(slot){pushUndo();slot.split=true;slot.splitAId=slot.areaId||null;slot.splitBId=null;slot.areaId=null;saveDB();closeModal();renderTab();toast('⚡ Dividida');}}
function addSlotRow(){tap();openModal(`<div class="modal-title">➕ Añadir tramo</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label>Inicio</label><input type="time" id="ns-inicio" value="08:00"></div><div class="fg"><label>Fin</label><input type="time" id="ns-fin" value="09:00"></div></div><div class="fg"><label>Tipo</label><div style="display:flex;gap:12px;margin-top:4px"><label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-weight:600"><input type="radio" name="ns-tipo" value="sesion" checked> Sesión</label><label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-weight:600"><input type="radio" name="ns-tipo" value="recreo"> ☀️ Recreo</label></div></div><div class="modal-actions"><button class="btn btn-accent" onclick="saveNewSlot()">Guardar</button><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button></div>`);}
function saveNewSlot(){const inicio=document.getElementById('ns-inicio').value;const fin=document.getElementById('ns-fin').value;if(inicio>=fin){toast('⚠️ Fin debe ser posterior');return;}const esRecreo=document.querySelector('input[name=ns-tipo]:checked')?.value==='recreo';if(!DB.tramoBase)DB.tramoBase=[];DB.tramoBase.push({id:uid(),inicio,fin,recreo:esRecreo});DB.tramoBase.sort((a,b)=>a.inicio.localeCompare(b.inicio));DIAS_K.forEach(dia=>{if(!DB.horario[dia])DB.horario[dia]=[];DB.horario[dia].push({id:uid(),inicio,fin,areaId:null,split:false,splitAId:null,splitBId:null,recreo:esRecreo});DB.horario[dia].sort((a,b)=>a.inicio.localeCompare(b.inicio));});saveDB();closeModal();renderTab();toast('✅ Tramo añadido');}

function addArea(){tap();const initColor=COLORS[colorIdx%COLORS.length];openModal(`<div class="modal-title">📚 Nueva área</div><div class="fg"><label>Tipo</label><div style="display:flex;gap:12px"><label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-weight:600"><input type="radio" name="tipo" value="docencia" checked> 📖 Docencia</label><label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-weight:600"><input type="radio" name="tipo" value="nd"> 🗂️ No docencia</label></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label>Nombre</label><input type="text" id="an-nombre" placeholder="Ej: Matemáticas"></div><div class="fg"><label>Aula / Grupo</label><input type="text" id="an-grupo" placeholder="Ej: 3ºA" style="background:var(--paper);color:var(--ink2);font-style:italic"></div></div>${colorModalHTML(initColor,'an')}<div class="modal-actions"><button class="btn btn-accent" onclick="saveArea()">💾 Guardar</button><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button></div>`);setTimeout(()=>selColor(initColor,'an'),40);}
function saveArea(){const n=document.getElementById('an-nombre').value.trim();if(!n){toast('⚠️ Introduce un nombre');return;}const t=document.querySelector('input[name=tipo]:checked')?.value||'docencia';const g=document.getElementById('an-grupo')?.value.trim()||'';const c=document.getElementById('an-color')?.value||nextColor();pushUndo();DB.areas.push({id:uid(),nombre:n,tipo:t,grupo:g,color:c});colorIdx++;saveDB();closeModal();renderTab();toast('✅ Área creada');}

function renderResumen(){
const lunes=getMonday(selDate);let totalMin=0;const byArea={};
for(let i=0;i<5;i++){const d=new Date(lunes);d.setDate(d.getDate()+i);const dk=fmtDate(d);const dkKey=diaKey(d);const slots=(dkKey?DB.horario[dkKey]:[])||[];slots.forEach(s=>{if(s.recreo)return;const min=slotMin(s);if(s.split){if(s.splitAId){if(!byArea[s.splitAId])byArea[s.splitAId]=0;byArea[s.splitAId]+=Math.floor(min/2);totalMin+=Math.floor(min/2);}if(s.splitBId){if(!byArea[s.splitBId])byArea[s.splitBId]=0;byArea[s.splitBId]+=Math.floor(min/2);totalMin+=Math.floor(min/2);}}else if(s.areaId){if(!byArea[s.areaId])byArea[s.areaId]=0;byArea[s.areaId]+=min;totalMin+=min;}});}
const bars=Object.entries(byArea).sort((a,b)=>b[1]-a[1]).map(([id,min])=>{const a=getArea(id);if(!a)return '';const pct=totalMin>0?Math.round(min/totalMin*100):0;return `<div class="bar-row"><div class="bar-row-top"><span style="display:flex;align-items:center;gap:6px"><span style="width:10px;height:10px;border-radius:50%;background:${a.color};display:inline-block"></span>${areaLabel(id)}</span><span>${(min/60).toFixed(1)}h</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${a.color}"></div></div></div>`;}).join('');
return `<div class="card"><div class="stat-grid"><div class="stat-card"><div class="stat-val">${(totalMin/60).toFixed(1)}h</div><div class="stat-lbl">Horas lectivas</div></div></div>${bars||'<div class="empty"><p>Sin datos.</p></div>'}</div>`;
}

function textoHTML(t){if(!t)return '<span style="color:#bbb;font-style:italic">—</span>';return t.split(/\n+/).filter(l=>l.trim()).map(l=>`<p style="margin:0 0 5px 0;line-height:1.55">${l.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>`).join('');}
function downloadHTML(html,filename){const blob=new Blob([html],{type:'text/html;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),2000);toast('📄 Descargado.');}

init();
</script>
</body>
